name: CI Pipeline

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test

jobs:
  frontend:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Build Check
        run: npm run build

  autopr:
    name: Auto-Create Pull Request to Main
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Create PR from test to main
        run: |
          # Fetch main to compare
          git fetch origin main
          
          # Check if there are differences between test and main
          diff_count=$(git log origin/main..origin/test --oneline | wc -l)
          if [ "$diff_count" -eq 0 ]; then
            echo "No changes between test and main. Skipping PR creation."
            exit 0
          fi
          
          # Check if PR already exists
          pr_number=$(gh pr list --base main --head test --state open --json number -q '.[].number')
          if [ -z "$pr_number" ]; then
            echo "Creating Pull Request..."
            gh pr create \
              --base main \
              --head test \
              --title "chore: merge test branch into main" \
              --body "Automated Pull Request generated by CI pipeline after successful test branch run."
          else
            echo "Pull Request already exists: PR #$pr_number"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
