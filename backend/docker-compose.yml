# N.A.D.I. admin backend — read-only analytics API.
# Connects to the standalone shared database (the mobile repo's
# docker-compose.db.yml) as the read-only `nadi_readonly` role, over the
# host-published port via host.docker.internal. No shared Docker network and no
# startup ordering beyond "the database is up".
#
# Usage:
#   1. Start the shared DB (from the mobile repo):
#        docker compose -f docker-compose.db.yml up -d
#   2. Then from here:
#        docker compose up -d
services:
  admin_api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100
    env_file: .env
    ports: ["8100:8100"]
    extra_hosts: ["host.docker.internal:host-gateway"]
